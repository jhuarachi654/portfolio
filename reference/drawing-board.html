<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Domine:wght@400;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: #ffffff;
    height: 100vh;
    overflow: hidden;
    color: #1E4B9A;
  }

  #app { width: 100%; height: 100vh; position: relative; }

  #canvas-world {
    position: absolute;
    width: 4000px; height: 3000px;
    top: 0; left: 0;
    transform-origin: 0 0;
    pointer-events: none;
    background-image:
      linear-gradient(to right, rgba(29,195,176,0.12) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(29,195,176,0.12) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  #visitor-badge {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: none;
    color: #29C4B0;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 500;
    z-index: 100;
    letter-spacing: 0.04em;
    white-space: nowrap;
    pointer-events: none;
  }

  #board-view {
    width: 100%; height: 100vh;
    position: relative; overflow: hidden;
    cursor: grab; z-index: 1;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  #board-view.panning { cursor: grabbing; }

  .sticky {
    position: absolute;
    width: 220px;
    background: #FFFEF5;
    border-radius: 2px;
    padding: 12px;
    box-shadow: 2px 3px 10px rgba(30,75,154,0.10), 0 1px 2px rgba(30,75,154,0.06);
    transform-origin: center center;
    pointer-events: none;
  }
  .sticky canvas {
    width: 100%;
    height: 196px;
    display: block;
    border-radius: 1px;
  }
  .sticky .sticky-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: #9aa5b4;
    margin-top: 8px;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-height: 20px;
    line-height: 20px;
    letter-spacing: 0.02em;
  }
  .sticky .sticky-tape {
    position: absolute;
    top: -9px;
    left: 50%;
    transform: translateX(-50%);
    width: 44px;
    height: 18px;
    background: rgba(41,196,176,0.35);
    border-radius: 1px;
  }

  /* Bottom toolbar */
  #toolbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    pointer-events: none;
    z-index: 100;
  }
  #toolbar > * { pointer-events: all; }

  #zoom-controls {
    display: flex;
    align-items: center;
    gap: 2px;
    background: rgba(255,255,255,0.92);
    border: 1.5px solid rgba(30,75,154,0.15);
    border-radius: 100px;
    padding: 3px;
  }

  .zoom-btn, #recenter-btn {
    background: transparent;
    color: #1E4B9A;
    border: none;
    border-radius: 100px;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 20px; font-weight: 300;
    line-height: 1;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .zoom-btn:hover, #recenter-btn:hover { background: rgba(30,75,154,0.08); }
  .zoom-btn:active, #recenter-btn:active { transform: scale(0.88); background: rgba(30,75,154,0.12); }

  .zoom-divider {
    width: 1px; height: 16px;
    background: rgba(30,75,154,0.15);
    flex-shrink: 0;
  }

  #draw-btn {
    background: #1E4B9A; color: #ffffff;
    border: none; border-radius: 100px;
    padding: 0 22px;
    height: 44px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    letter-spacing: 0.02em;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  #draw-btn:hover { background: #163a7a; }
  #draw-btn:active { transform: scale(0.97); }

  #modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(30,75,154,0.25);
    z-index: 200; align-items: flex-end; justify-content: center;
    backdrop-filter: blur(2px);
  }
  #modal-overlay.open { display: flex; }

  @media (min-width: 600px) {
    #modal-overlay { align-items: center; }
    #modal { border-radius: 16px !important; }
  }

  #modal {
    background: #ffffff;
    border: 1px solid rgba(30,75,154,0.12);
    border-radius: 20px 20px 0 0;
    width: 100%; max-width: 480px;
    max-height: 92vh;
    overflow-y: auto;
    padding: 28px 28px max(28px, env(safe-area-inset-bottom));
    position: relative;
    box-shadow: 0 -4px 40px rgba(30,75,154,0.14);
  }
  #modal::before {
    content: '';
    display: block;
    width: 36px; height: 4px;
    background: rgba(30,75,154,0.15);
    border-radius: 2px;
    margin: -8px auto 20px;
  }

  #modal h2 {
    font-family: 'Domine', serif;
    font-size: 26px; font-weight: 700;
    color: #1E4B9A; margin-bottom: 4px;
    line-height: 1.2;
  }
  #modal p.sub {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px; color: #9aa5b4;
    margin-bottom: 20px;
    font-weight: 400; letter-spacing: 0.02em;
  }

  #draw-area-wrap {
    position: relative; border-radius: 8px;
    overflow: hidden; background: #FFFEF5;
    border: 1.5px solid rgba(30,75,154,0.15);
    margin-bottom: 14px;
  }
  #draw-area {
    display: block; width: 100%; height: 240px;
    cursor: crosshair; touch-action: none;
  }

  .draw-tools {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 14px; flex-wrap: wrap;
  }

  .color-swatch {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer;
    transition: transform 0.1s; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .color-swatch:active { transform: scale(0.9); }
  .color-swatch.active { border-color: #1E4B9A; box-shadow: 0 0 0 1px #fff inset; }

  .tool-btn {
    background: rgba(30,75,154,0.06);
    border: 1px solid rgba(30,75,154,0.12);
    border-radius: 8px;
    padding: 6px 14px; font-size: 13px;
    font-family: 'Space Grotesk', sans-serif;
    cursor: pointer; color: #1E4B9A; font-weight: 500;
    transition: background 0.1s; white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .tool-btn:hover { background: rgba(30,75,154,0.1); }
  .tool-btn.active { background: #1E4B9A; color: #ffffff; border-color: #1E4B9A; }

  .size-dots { display: flex; gap: 8px; align-items: center; }
  .size-dot {
    background: #1E4B9A; border-radius: 50%;
    cursor: pointer; flex-shrink: 0;
    opacity: 0.25; transition: opacity 0.1s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .size-dot:active { opacity: 0.6; }
  .size-dot.active { opacity: 1; transform: scale(1.15); }

  #name-input {
    width: 100%; padding: 11px 14px;
    border-radius: 8px;
    border: 1.5px solid rgba(30,75,154,0.2);
    background: #ffffff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    color: #1E4B9A; outline: none; margin-bottom: 14px;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  #name-input:focus { border-color: #29C4B0; }
  #name-input::placeholder { color: rgba(30,75,154,0.3); }

  .modal-actions { display: flex; gap: 10px; }

  #preview-btn, #post-btn, #back-btn {
    flex: 1; padding: 13px; border-radius: 10px;
    border: none;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px; font-weight: 500;
    cursor: pointer; transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
  }
  #preview-btn:active, #post-btn:active, #back-btn:active { transform: scale(0.97); }

  #preview-btn { background: #1E4B9A; color: #ffffff; }
  #preview-btn:hover { background: #163a7a; }

  #clear-btn {
    background: rgba(30,75,154,0.06);
    border: 1px solid rgba(30,75,154,0.12);
    border-radius: 8px;
    color: #1E4B9A; flex: 0 0 auto; padding: 6px 14px;
    font-size: 13px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.1s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  #clear-btn:hover { background: rgba(30,75,154,0.1); }

  #post-btn { background: #29C4B0; color: #ffffff; }
  #post-btn:hover { background: #21a898; }
  #post-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  #back-btn {
    background: rgba(30,75,154,0.06);
    border: 1px solid rgba(30,75,154,0.12);
    color: #1E4B9A;
  }
  #back-btn:hover { background: rgba(30,75,154,0.1); }

  #preview-view { display: none; }
  #draw-view { display: block; }

  #preview-img {
    width: 100%; height: 240px; object-fit: contain;
    border-radius: 8px; background: #FFFEF5;
    border: 1.5px solid rgba(30,75,154,0.15);
    margin-bottom: 14px;
  }

  #empty-state {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; pointer-events: none; z-index: 2;
  }
  #empty-state p {
    font-family: 'Domine', serif;
    font-size: 20px; color: rgba(30,75,154,0.25); line-height: 1.5;
  }
  #empty-state span {
    display: block;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px; color: #29C4B0;
    margin-top: 8px; letter-spacing: 0.06em; font-weight: 500;
    text-transform: uppercase;
  }

  #close-modal {
    position: absolute; top: 20px; right: 20px;
    background: rgba(30,75,154,0.06);
    border: 1px solid rgba(30,75,154,0.12);
    border-radius: 50%;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; color: #1E4B9A;
    font-family: 'Space Grotesk', sans-serif;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  #close-modal:hover { background: rgba(30,75,154,0.12); }

  #hint {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%);
    background: rgba(30,75,154,0.08);
    color: #1E4B9A;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px; font-weight: 500;
    padding: 7px 14px;
    border-radius: 100px;
    letter-spacing: 0.04em;
    pointer-events: none;
    z-index: 99;
    opacity: 1;
    transition: opacity 0.6s;
  }
  #hint.hidden { opacity: 0; }
</style>
</head>
<body>
<div id="app">

  <div id="visitor-badge"><span id="visitor-count">—</span> visitors have drawn here</div>

  <div id="hint">drag to pan · use + − to zoom</div>

  <div id="empty-state">
    <p id="empty-state-text">Be the first to leave your mark</p>
  </div>

  <div id="board-view">
    <div id="canvas-world"></div>
  </div>

  <div id="toolbar">
    <div id="zoom-controls">
      <button class="zoom-btn" id="zoom-out-btn" aria-label="Zoom out">&#8722;</button>
      <div class="zoom-divider"></div>
      <button id="recenter-btn" aria-label="Fit all to view">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
      </button>
      <div class="zoom-divider"></div>
      <button class="zoom-btn" id="zoom-in-btn" aria-label="Zoom in">+</button>
    </div>
    <button id="draw-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Draw something
    </button>
  </div>

  <div id="modal-overlay">
    <div id="modal">
      <button id="close-modal" aria-label="Close">✕</button>

      <div id="draw-view">
        <h2>Leave your mark</h2>
        <p class="sub">This is a collaborative drawing journal. What will you draw today?</p>

        <div id="draw-area-wrap">
          <canvas id="draw-area"></canvas>
        </div>

        <div class="draw-tools">
          <div class="color-swatch active" data-color="#1E4B9A" style="background:#1E4B9A"></div>
          <div class="color-swatch" data-color="#29C4B0" style="background:#29C4B0"></div>
          <div class="color-swatch" data-color="#E84545" style="background:#E84545"></div>
          <div class="color-swatch" data-color="#F5A623" style="background:#F5A623"></div>
          <div class="color-swatch" data-color="#6B5CE7" style="background:#6B5CE7"></div>
          <div class="color-swatch" data-color="#222222" style="background:#222222"></div>
          <div style="flex:1"></div>
          <div class="size-dots">
            <div class="size-dot active" data-size="3" style="width:10px;height:10px"></div>
            <div class="size-dot" data-size="6" style="width:14px;height:14px"></div>
            <div class="size-dot" data-size="12" style="width:20px;height:20px"></div>
          </div>
          <button class="tool-btn active" id="pen-btn">Pen</button>
          <button class="tool-btn" id="clear-btn">Clear</button>
        </div>

        <input id="name-input" type="text" placeholder="Your name (or leave blank)" maxlength="40" autocomplete="off" />

        <div class="modal-actions">
          <button id="preview-btn">Preview →</button>
        </div>
      </div>

      <div id="preview-view">
        <h2>Looks good?</h2>
        <img id="preview-img" alt="Your drawing preview" />
        <div class="modal-actions">
          <button id="back-btn">← Edit</button>
          <button id="post-btn">Post to board ✦</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://jwjpnwxzpjtjigquuism.supabase.co';
const SUPABASE_KEY = 'sb_publishable_HIcPdHfVH7_58p5skQFVNg_DNqCKa7R';

const CLUSTER_OX = 1200, CLUSTER_OY = 900;
const STICKY_W = 240;
const STICKY_H = 270;

let drawings = [];
let panX = 0, panY = 0, scale = 1;
let isPanning = false;
let panStartX, panStartY, panOriginX, panOriginY;

const boardView = document.getElementById('board-view');
const world = document.getElementById('canvas-world');

function applyTransform(animated) {
  if (animated) {
    world.style.transition = 'transform 0.45s cubic-bezier(0.25,0.1,0.25,1)';
    setTimeout(() => { world.style.transition = ''; }, 500);
  }
  world.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

function fitToContent(animated) {
  const W = boardView.clientWidth || window.innerWidth;
  const H = boardView.clientHeight || window.innerHeight;
  const PADDING = Math.min(60, W * 0.08);

  if (drawings.length === 0) {
    scale = 1;
    panX = W / 2 - CLUSTER_OX;
    panY = H / 2 - CLUSTER_OY;
    applyTransform(animated);
    return;
  }

  const xs = drawings.map(d => d.position_x);
  const ys = drawings.map(d => d.position_y);
  const minX = Math.min(...xs);
  const maxX = Math.max(...xs) + STICKY_W;
  const minY = Math.min(...ys);
  const maxY = Math.max(...ys) + STICKY_H;

  const contentW = maxX - minX;
  const contentH = maxY - minY;
  const midX = (minX + maxX) / 2;
  const midY = (minY + maxY) / 2;

  const scaleX = (W - PADDING * 2) / contentW;
  const scaleY = (H - PADDING * 2) / contentH;
  scale = Math.min(scaleX, scaleY, 1.2);
  scale = Math.max(scale, 0.25);

  panX = W / 2 - midX * scale;
  panY = H / 2 - midY * scale;
  applyTransform(animated);
}

boardView.addEventListener('mousedown', e => {
  if (e.target.closest('#draw-btn') || e.target.closest('#zoom-controls') || e.target.closest('#modal-overlay')) return;
  isPanning = true;
  boardView.classList.add('panning');
  panStartX = e.clientX; panStartY = e.clientY;
  panOriginX = panX; panOriginY = panY;
});
window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  panX = panOriginX + (e.clientX - panStartX);
  panY = panOriginY + (e.clientY - panStartY);
  applyTransform();
});
window.addEventListener('mouseup', () => { isPanning = false; boardView.classList.remove('panning'); });

let isModalOpen = false;

let gestureMode = 'none';
let panRef = { x: 0, y: 0, panX: 0, panY: 0 };
let pinchRef = { dist: 1, scale: 1, midX: 0, midY: 0, panX: 0, panY: 0 };

function midpoint(t1, t2) {
  return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 };
}
function dist(t1, t2) {
  return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
}

boardView.addEventListener('touchstart', e => {
  e.preventDefault();
  document.getElementById('hint').classList.add('hidden');

  if (e.touches.length === 1) {
    gestureMode = 'pan';
    panRef = { x: e.touches[0].clientX, y: e.touches[0].clientY, panX: panX, panY: panY };
  } else if (e.touches.length >= 2) {
    gestureMode = 'pinch';
    const t1 = e.touches[0], t2 = e.touches[1];
    const mid = midpoint(t1, t2);
    pinchRef = { dist: dist(t1, t2), scale: scale, midX: mid.x, midY: mid.y, panX: panX, panY: panY };
  }
}, { passive: false });

boardView.addEventListener('touchmove', e => {
  e.preventDefault();

  if (gestureMode === 'pinch' && e.touches.length >= 2) {
    const t1 = e.touches[0], t2 = e.touches[1];
    const d = dist(t1, t2);
    const mid = midpoint(t1, t2);
    const newScale = Math.min(3, Math.max(0.2, pinchRef.scale * (d / pinchRef.dist)));
    const ratio = newScale / pinchRef.scale;
    panX = mid.x - ratio * (pinchRef.midX - pinchRef.panX);
    panY = mid.y - ratio * (pinchRef.midY - pinchRef.panY);
    scale = newScale;
    applyTransform();

  } else if (gestureMode === 'pan' && e.touches.length === 1) {
    const t = e.touches[0];
    panX = panRef.panX + (t.clientX - panRef.x);
    panY = panRef.panY + (t.clientY - panRef.y);
    applyTransform();
  }
}, { passive: false });

boardView.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.touches.length === 0) {
    gestureMode = 'none';
  } else if (e.touches.length === 1) {
    gestureMode = 'pan';
    panRef = { x: e.touches[0].clientX, y: e.touches[0].clientY, panX: panX, panY: panY };
  }
}, { passive: false });

document.getElementById('recenter-btn').addEventListener('click', () => fitToContent(true));

function zoomAround(factor) {
  const W = boardView.clientWidth || window.innerWidth;
  const H = boardView.clientHeight || window.innerHeight;
  const cx = W / 2, cy = H / 2;
  const newScale = Math.min(3, Math.max(0.15, scale * factor));
  panX = cx - (cx - panX) * (newScale / scale);
  panY = cy - (cy - panY) * (newScale / scale);
  scale = newScale;
  applyTransform(true);
}
document.getElementById('zoom-in-btn').addEventListener('click', () => zoomAround(1.35));
document.getElementById('zoom-out-btn').addEventListener('click', () => zoomAround(1 / 1.35));

const overlay = document.getElementById('modal-overlay');

function openModal() {
  isModalOpen = true;
  overlay.classList.add('open');
  document.getElementById('draw-view').style.display = 'block';
  document.getElementById('preview-view').style.display = 'none';
  setTimeout(resizeDrawCanvas, 80);
}
function closeModal() {
  isModalOpen = false;
  overlay.classList.remove('open');
}

document.getElementById('draw-btn').addEventListener('click', openModal);
document.getElementById('close-modal').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

const drawCanvas = document.getElementById('draw-area');
const ctx = drawCanvas.getContext('2d');
let isDrawing = false, currentColor = '#1E4B9A', currentSize = 3, lastX = 0, lastY = 0;

function resizeDrawCanvas() {
  const rect = drawCanvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  drawCanvas.width = rect.width * dpr;
  drawCanvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
}

function getPos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

function startDraw(e) {
  isDrawing = true;
  const p = getPos(e); lastX = p.x; lastY = p.y;
  ctx.beginPath();
  ctx.arc(p.x, p.y, currentSize / 2, 0, Math.PI * 2);
  ctx.fillStyle = currentColor;
  ctx.fill();
}
function moveDraw(e) {
  if (!isDrawing) return;
  const p = getPos(e);
  ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y);
  ctx.strokeStyle = currentColor;
  ctx.lineWidth = currentSize;
  ctx.stroke();
  lastX = p.x; lastY = p.y;
}
function endDraw() { isDrawing = false; }

drawCanvas.addEventListener('mousedown', startDraw);
drawCanvas.addEventListener('mousemove', moveDraw);
drawCanvas.addEventListener('mouseup', endDraw);
drawCanvas.addEventListener('mouseleave', endDraw);
drawCanvas.addEventListener('touchstart', e => { e.stopPropagation(); startDraw(e); }, { passive: false });
drawCanvas.addEventListener('touchmove', e => { e.stopPropagation(); e.preventDefault(); moveDraw(e); }, { passive: false });
drawCanvas.addEventListener('touchend', e => { e.stopPropagation(); endDraw(); }, { passive: false });

document.querySelectorAll('.color-swatch').forEach(s => {
  s.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    currentColor = s.dataset.color;
  });
});
document.querySelectorAll('.size-dot').forEach(d => {
  d.addEventListener('click', () => {
    document.querySelectorAll('.size-dot').forEach(x => x.classList.remove('active'));
    d.classList.add('active');
    currentSize = parseInt(d.dataset.size);
  });
});
document.getElementById('pen-btn').addEventListener('click', () => {
  document.getElementById('pen-btn').classList.add('active');
});
document.getElementById('clear-btn').addEventListener('click', () => {
  const rect = drawCanvas.getBoundingClientRect();
  ctx.clearRect(0, 0, rect.width, rect.height);
});

document.getElementById('preview-btn').addEventListener('click', () => {
  document.getElementById('preview-img').src = drawCanvas.toDataURL('image/png');
  document.getElementById('draw-view').style.display = 'none';
  document.getElementById('preview-view').style.display = 'block';
});
document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('draw-view').style.display = 'block';
  document.getElementById('preview-view').style.display = 'none';
});

document.getElementById('post-btn').addEventListener('click', async () => {
  const postBtn = document.getElementById('post-btn');
  postBtn.disabled = true; postBtn.textContent = 'Posting...';

  const dataUrl = drawCanvas.toDataURL('image/png');
  const rawName = document.getElementById('name-input').value.trim();
  const n = drawings.length + 1;
  const name = rawName || `visitor_${String(n).padStart(2, '0')}`;

  const slot = findFreeSlot();
  const rot = (Math.random() - 0.5) * 10;

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/drawings`, {
      method: 'POST',
      headers: {
        apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json', Prefer: 'return=representation'
      },
      body: JSON.stringify({ name, image_url: dataUrl, position_x: slot.x, position_y: slot.y, rotation: rot })
    });
    const saved = await res.json();
    const d = Array.isArray(saved) ? saved[0] : saved;
    drawings.push(d);
    placedRects.push({ x: slot.x, y: slot.y });
    renderSticky({ name, imageData: dataUrl, x: slot.x, y: slot.y, rotation: rot, id: d.id });
    updateVisitorCount(drawings.length);
    panToSticky(slot.x, slot.y);

    fetch(`${SUPABASE_URL}/rest/v1/visitors`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ created_at: new Date().toISOString() })
    }).catch(() => {});
  } catch(e) { console.warn('Post failed:', e); }

  closeModal();
  document.getElementById('name-input').value = '';
  const rect = drawCanvas.getBoundingClientRect();
  ctx.clearRect(0, 0, rect.width, rect.height);
  postBtn.disabled = false; postBtn.textContent = 'Post to board ✦';
});

const placedRects = [];

function findFreeSlot() {
  if (placedRects.length === 0) return { x: CLUSTER_OX, y: CLUSTER_OY };
  for (let radius = 0; radius < 40; radius++) {
    for (let row = -radius; row <= radius; row++) {
      for (let col = -radius; col <= radius; col++) {
        if (Math.abs(row) !== radius && Math.abs(col) !== radius) continue;
        const cx = CLUSTER_OX + col * STICKY_W;
        const cy = CLUSTER_OY + row * STICKY_H;
        if (!overlaps(cx, cy)) return { x: cx, y: cy };
      }
    }
  }
  return { x: CLUSTER_OX + placedRects.length * (STICKY_W + 10), y: CLUSTER_OY };
}

function overlaps(x, y) {
  return placedRects.some(r =>
    x < r.x + STICKY_W && x + STICKY_W > r.x &&
    y < r.y + STICKY_H && y + STICKY_H > r.y
  );
}

function renderSticky(d) {
  const el = document.createElement('div');
  el.className = 'sticky';
  el.style.left = (d.x || d.position_x) + 'px';
  el.style.top  = (d.y || d.position_y) + 'px';
  el.style.transform = `rotate(${d.rotation}deg)`;
  el.innerHTML = '<div class="sticky-tape"></div>';

  const c = document.createElement('canvas');
  c.width = 196; c.height = 196;
  el.appendChild(c);

  const nameEl = document.createElement('div');
  nameEl.className = 'sticky-name';
  const displayName = d.name
    ? d.name.replace(/^Visitor #(\d+)$/, (_, n) => `visitor_${String(n).padStart(2, '0')}`)
    : '';
  nameEl.textContent = displayName;
  el.appendChild(nameEl);
  world.appendChild(el);

  const img = new Image();
  img.onload = () => { c.getContext('2d').drawImage(img, 0, 0, 196, 196); };
  img.src = d.imageData || d.image_url;

  document.getElementById('empty-state').style.display = 'none';
}

function panToSticky(wx, wy) {
  const W = boardView.clientWidth || window.innerWidth;
  const H = boardView.clientHeight || window.innerHeight;
  panX = W / 2 - (wx + STICKY_W / 2) * scale;
  panY = H / 2 - (wy + STICKY_H / 2) * scale;
  applyTransform(true);
}

function updateVisitorCount(n) {
  document.getElementById('visitor-count').textContent = n;
}

async function loadDrawings() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/drawings?select=*&order=created_at.asc`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    if (!Array.isArray(data)) return;
    drawings = data;
    placedRects.length = 0;
    data.forEach(d => placedRects.push({ x: d.position_x, y: d.position_y }));
    data.forEach(d => renderSticky({ ...d, x: d.position_x, y: d.position_y }));
    updateVisitorCount(data.length);
    fitToContent(false);
    if (data.length === 0) document.getElementById('empty-state').style.display = 'block';
  } catch(e) { console.warn('Load failed:', e); }
}

setInterval(async () => {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/drawings?select=*&order=created_at.desc&limit=5`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    if (!Array.isArray(data)) return;
    data.forEach(d => {
      if (!drawings.find(x => x.id === d.id)) {
        drawings.push(d);
        placedRects.push({ x: d.position_x, y: d.position_y });
        renderSticky({ ...d, x: d.position_x, y: d.position_y });
        updateVisitorCount(drawings.length);
      }
    });
  } catch(e) {}
}, 8000);

window.addEventListener('resize', () => fitToContent(false));

setTimeout(() => document.getElementById('hint').classList.add('hidden'), 4000);
['mousedown','touchstart','wheel'].forEach(ev => {
  boardView.addEventListener(ev, () => document.getElementById('hint').classList.add('hidden'), { once: true });
});

loadDrawings();
</script>
